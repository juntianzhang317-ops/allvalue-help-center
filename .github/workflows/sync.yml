name: 同步飞书知识库

on:
  # 每6小时自动同步
  schedule:
    - cron: '0 */6 * * *'
  # 也可以手动触发
  workflow_dispatch:
  # 推送到 main 分支时触发
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 同步知识库
        run: npm run sync
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_SPACE_ID: ${{ secrets.FEISHU_SPACE_ID }}

      - name: 提交更改
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add public/
          git diff --staged --quiet || git commit -m "chore: 同步知识库 $(date +'%Y-%m-%d %H:%M')"
          git push
